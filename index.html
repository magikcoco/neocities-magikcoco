<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    body {
      margin: 0;
    }

    .sidebar {
      background-image: url('mushroom-wallpaper.jpg');
      background-size: cover;
      border-left: 5px solid black;
      height: 100vh;
      width: calc(100vw / 6);
      position: fixed;
      right: 0;
      top: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    
    .sidebar img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      padding-top: 10px;
    }
    
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div>WIP website</div>
  <div class="sidebar">
    <div class="particles"></div>
    <img src="magikcoco.png">
  </div>
</body>
</html>
