<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGIKCOCO</title>
  <style>
  
    body {
      margin: 0;
    }

    .sidebar {
      background-image: url('mushroom-wallpaper.jpg');
      background-size: cover;
      border-left: 5px solid black;
      height: 100vh;
      width: calc(100vw / 6);
      position: fixed;
      right: 0;
      top: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    
    .magikcoco-pfp-container {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      padding-top: 20px;
    }
    
    .magikcoco-pfp-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      padding-top: 0px;
      border-radius: 50%;
      box-shadow: 0px 0px 9px 4px #747DE8;
      animation: glow 2.0s linear infinite alternate;
    }
    
    @keyframes glow{
      to {
        box-shadow: 0px 0px 25px 15px #535FED;
      }
    }
    
  </style>
</head>
<body>
  <div>WIP website</div>
  <div class="sidebar">
    <div class="magikcoco-pfp-container">
      <img class="magikcoco-pfp" src="magikcoco.png">
    </div>
  </div>
</body>
</html>
